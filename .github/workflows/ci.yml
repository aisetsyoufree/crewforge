name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Syntax check
        run: |
          node --check server.js
          node --check public/app.js
          find adapters lib scripts test -name '*.js' -print0 | xargs -0 -n1 node --check
          node - <<'NODE'
          const fs = require('fs');
          const vm = require('vm');
          const html = fs.readFileSync('public/index.html', 'utf8');
          const scripts = [...html.matchAll(/<script[^>]*>([\s\S]*?)<\/script>/gi)].map(m => m[1]);
          for (const [i, script] of scripts.entries()) new vm.Script(script, { filename: `public/index.html#script${i + 1}` });
          console.log(`checked ${scripts.length} browser script block(s)`);
          NODE
      - name: Test
        run: npm test
